name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: OCaml tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev pkg-config

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.4.1

      - name: Add Jane Street preview repositories
        run: |
          opam repo add janestreet-bleeding-external git+https://github.com/janestreet/opam-repository.git#external-packages
          opam repo add janestreet-bleeding git+https://github.com/janestreet/opam-repository.git
          opam update

      - name: Pin unpublished git dependencies
        run: |
          opam pin add --no-action persistent_sorted_set_ocaml.dev 'git+https://github.com/logseq/persistent-sorted-set-ocaml.git#074401d81ca22b9d44c725d7f171a67d69765a31'
          opam pin add --no-action melange-edn.0.5.0 'git+https://github.com/RCmerci/melange-edn.git#bdc79c1d1d6edc9b0874113759bee29ce45f53f5'

      - name: Install Melange build tool
        run: opam install melange -y

      - name: Install OCaml dependencies
        run: opam install . --deps-only --with-test -y

      - name: Run tests
        run: opam exec -- dune runtest
